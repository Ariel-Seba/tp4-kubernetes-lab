apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-lab
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Ariel-Seba/tp4-kubernetes-lab
    targetRevision: main
    path: kubernetes-lab

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
